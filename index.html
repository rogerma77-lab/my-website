<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDI - Frontier Dynamics International</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --fd-white: #FFFFFF;
            --fd-light-grey: #F8F9FA;
            --fd-dark: #111111;
            --dynamic-red: #E63946;
            --text-main: #2D2D2D;
            --text-sub: #666666;
            --card-shadow: 0 15px 40px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--fd-white); color: var(--text-main); line-height: 1.6; }

        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1rem 8%; background: rgba(255, 255, 255, 0.95); 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #EEE; backdrop-filter: blur(10px); 
        }
        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-img { height: 48px; width: auto; }
        .logo-text { font-size: 1.3rem; font-weight: 900; letter-spacing: 2px; color: var(--fd-dark); }
        .logo-text span { color: var(--dynamic-red); }

        .lang-select { background: transparent; color: var(--text-main); border: 1px solid #DDD; padding: 6px 16px; border-radius: 20px; cursor: pointer; }

        .section-title { text-align: center; margin-bottom: 70px; }
        .section-title h2 { font-size: 2.5rem; font-weight: 800; color: var(--fd-dark); margin-bottom: 15px; }
        .section-title .line { width: 50px; height: 4px; background: var(--dynamic-red); margin: 0 auto; border-radius: 2px; }

        /* --- 服务范围：3+2 布局 --- */
        .section-services { padding: 100px 8%; background: var(--fd-light-grey); }
        .services-grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); /* 划分为6列以便分配 3和2 */
            gap: 30px; 
        }
        .service-card { 
            background: var(--fd-white); border-radius: 16px; overflow: hidden; 
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); box-shadow: var(--card-shadow);
            grid-column: span 2; /* 默认第一行每项占2格，即一行3个 */
        }
        /* 第二行只有两个时，让它们居中占位 */
        .service-card:nth-child(4) { grid-column: 2 / 4; }
        .service-card:nth-child(5) { grid-column: 4 / 6; }

        .service-card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px rgba(0,0,0,0.15); }
        .service-img { width: 100%; height: 260px; object-fit: cover; }
        .service-info { padding: 30px; }
        .service-info h3 { font-size: 1.4rem; margin-bottom: 15px; color: var(--fd-dark); }
        .service-info p { color: var(--text-sub); font-size: 1rem; }

        /* --- 客户见证：横向专业排版 --- */
        .section-reviews { padding: 100px 8%; }
        .review-grid { display: flex; flex-direction: column; gap: 40px; max-width: 1100px; margin: 0 auto; }
        .review-card { 
            display: flex; background: var(--fd-white); border-radius: 20px; 
            overflow: hidden; box-shadow: var(--card-shadow); border: 1px solid #F0F0F0;
            align-items: stretch;
        }
        .review-img-wrapper { width: 40%; min-height: 300px; }
        .review-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .review-text-content { width: 60%; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        .review-text-content p { font-size: 1.2rem; font-style: italic; color: var(--text-main); margin: 20px 0; line-height: 1.8; }
        .stars { color: #FFD700; font-size: 1.1rem; }
        .reviewer-name { font-weight: 800; color: var(--fd-dark); font-size: 1.1rem; border-left: 3px solid var(--dynamic-red); padding-left: 15px; }

        /* 联系我们 */
        .section-contact { padding: 100px 8%; display: flex; gap: 60px; flex-wrap: wrap; background: var(--fd-dark); color: white; border-radius: 50px 50px 0 0; }
        .contact-info { flex: 1; }
        .contact-form { flex: 1.5; background: rgba(255,255,255,0.05); padding: 50px; border-radius: 24px; }
        input, textarea { width: 100%; padding: 18px; margin-bottom: 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; }
        .btn-submit { background: var(--dynamic-red); color: white; padding: 18px; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; transition: 0.3s; }
        .btn-submit:hover { background: #FF4D5B; transform: scale(1.02); }

        @media (max-width: 992px) {
            .service-card, .service-card:nth-child(4), .service-card:nth-child(5) { grid-column: span 3; }
            .review-card { flex-direction: column; }
            .review-img-wrapper, .review-text-content { width: 100%; }
        }
        @media (max-width: 600px) {
            .service-card, .service-card:nth-child(4), .service-card:nth-child(5) { grid-column: span 6; }
        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo-container">
        <img src="logo.png" alt="FDI Logo" class="logo-img">
        <div class="logo-text">FRONTIER <span>DYNAMICS</span></div>
    </a>
    <select class="lang-select" onchange="updateLang(this.value)">
        <option value="zh">中文</option>
        <option value="en">English</option>
    </select>
</nav>

<!-- 关于我们 -->
<section class="section-about" style="padding: 100px 8%; display: flex; align-items: center; gap: 60px; flex-wrap: wrap;">
    <div class="about-content" style="flex:1; min-width:300px;">
        <h2 id="about-title" style="color: var(--dynamic-red); font-size: 2.5rem; margin-bottom: 25px;"></h2>
        <p id="about-text" style="font-size: 1.15rem; color: var(--text-sub);"></p>
    </div>
    <div class="about-image" style="flex:1; min-width:300px; border-radius: 20px; overflow: hidden; box-shadow: var(--card-shadow);">
        <img src="about-us.jpg" style="width:100%; display:block;">
    </div>
</section>

<!-- 服务范围 -->
<section class="section-services">
    <div class="section-title">
        <h2 id="serv-head">服务范围</h2>
        <div class="line"></div>
    </div>
    <div class="services-grid" id="serv-content"></div>
</section>

<!-- 客户见证 -->
<section class="section-reviews">
    <div class="section-title">
        <h2 id="review-title"></h2>
        <div class="line"></div>
    </div>
    <div class="review-grid" id="review-content"></div>
</section>

<!-- 联系我们 -->
<section class="section-contact">
    <div class="contact-info">
        <h2 id="contact-title" style="font-size: 2.5rem; margin-bottom: 20px;"></h2>
        <p id="contact-lang-hint" style="color: #AAA; margin-bottom: 30px;"></p>
        <div style="font-size: 1.2rem; color: var(--dynamic-red); font-weight: bold;">contact@fdi-corp.com</div>
    </div>
    <div class="contact-form">
        <form>
            <input type="text" id="form-name">
            <input type="email" id="form-email">
            <textarea id="form-msg" rows="4"></textarea>
            <button type="submit" class="btn-submit" id="form-btn"></button>
        </form>
    </div>
</section>

<script>
    const i18n = {
        zh: {
            aboutT: "关于 FDI",
            aboutX: "前沿动力国际 (FDI) 是一家全球领先的新能源商用车整合方案提供商。我们将中国顶尖供应链与德国尖端工程技术相结合，为全球物流企业提供从选型到售后的全生命周期支持。",
            servH: "服务范围",
            servs: [
                {t: "商用车选型顾问", p: "基于 TCO 测算与场景分析，提供最优车型配置方案。", img: "serv1.jpg"},
                {t: "车队升级计划", p: "定制化置换方案，助力企业快速完成新能源转型。", img: "serv2.jpg"},
                {t: "金融与交付支持", p: "融资租赁建议与标准化交付流程，加速资产入场。", img: "serv3.jpg"},
                {t: "备件及维保服务", p: "全球备件供应体系，确保车辆极高出勤率。", img: "serv4.jpg"},
                {t: "数字化运营支持", p: "车联网平台对接，实现车队能耗与效率实时监控。", img: "serv5.jpg"}
            ],
            revT: "客户见证",
            revs: [
                {p: "EVE 的 8 分钟换电技术彻底改变了我们的城市配送效率。FDI 的专业支持让转型变得异常简单。", a: "Hans Müller — 德国物流主管", img: "review1.jpg"},
                {p: "JAC 电车在日本狭窄街区的表现超出预期，可靠性极佳。FDI 是值得信赖的合作伙伴。", a: "Sato Kenji — 日本运营总监", img: "review2.jpg"}
            ],
            conT: "开启协作",
            conH: "我们的国际化团队支持四国语言，随时为您提供定制化方案。",
            fName: "姓名", fEmail: "邮箱地址", fMsg: "您想了解什么？", fBtn: "即刻获取方案"
        },
        en: {
            aboutT: "About FDI",
            aboutX: "Frontier Dynamics International (FDI) is a global leader in NEV commercial vehicle integration, merging China's supply chain with German engineering.",
            servH: "Services",
            servs: [
                {t: "Procurement Consulting", p: "TCO-based model selection for optimal fleet performance.", img: "serv1.jpg"},
                {t: "Fleet Modernization", p: "Custom replacement schemes for rapid NEV transition.", img: "serv2.jpg"},
                {t: "Finance & Logistics", p: "Leasing advice and streamlined delivery workflows.", img: "serv3.jpg"},
                {t: "Maintenance & Parts", p: "Global spare parts network ensuring maximum uptime.", img: "serv4.jpg"},
                {t: "Fleet Management", p: "Digital monitoring for energy consumption and efficiency.", img: "serv5.jpg"}
            ],
            revT: "Global Testimonials",
            revs: [
                {p: "EVE's 8-minute swap technology redefined our urban efficiency. FDI made the transition seamless.", a: "Hans Müller — Logistics Head, Germany", img: "review1.jpg"},
                {p: "JAC electric trucks excel in Japan's tight urban areas. FDI is a reliable strategic partner.", a: "Sato Kenji — Ops Director, Japan", img: "review2.jpg"}
            ],
            conT: "Get Started",
            conH: "Our team supports 4 languages for seamless global collaboration.",
            fName: "Your Name", fEmail: "Email Address", fMsg: "How can we help?", fBtn: "Send Inquiry"
        }
    };

    function updateLang(lang) {
        const d = i18n[lang] || i18n['en'];
        document.getElementById('about-title').innerText = d.aboutT;
        document.getElementById('about-text').innerText = d.aboutX;
        document.getElementById('serv-head').innerText = d.servH;
        document.getElementById('review-title').innerText = d.revT;
        document.getElementById('contact-title').innerText = d.conT;
        document.getElementById('contact-lang-hint').innerText = d.conH;
        document.getElementById('form-name').placeholder = d.fName;
        document.getElementById('form-email').placeholder = d.fEmail;
        document.getElementById('form-msg').placeholder = d.fMsg;
        document.getElementById('form-btn').innerText = d.fBtn;

        const sGrid = document.getElementById('serv-content');
        sGrid.innerHTML = d.servs.map(s => `
            <div class="service-card">
                <img src="${s.img}" class="service-img">
                <div class="service-info">
                    <h3>${s.t}</h3>
                    <p>${s.p}</p>
                </div>
            </div>
        `).join('');

        const rGrid = document.getElementById('review-content');
        rGrid.innerHTML = d.revs.map(r => `
            <div class="review-card">
                <div class="review-img-wrapper"><img src="${r.img}"></div>
                <div class="review-text-content">
                    <div class="stars">★★★★★</div>
                    <p>"${r.p}"</p>
                    <div class="reviewer-name">${r.a}</div>
                </div>
            </div>
        `).join('');
    }

    updateLang('zh');
</script>
</body>
</html>
