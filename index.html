<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDI - Frontier Dynamics International</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --fd-white: #FFFFFF;
            --fd-light-grey: #F8F9FA;
            --fd-dark: #1A1A1A;
            --dynamic-red: #E63946; /* 保留品牌红 */
            --text-main: #333333;
            --text-sub: #666666;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--fd-white); color: var(--text-main); line-height: 1.6; }

        /* 导航栏：清爽白 */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1rem 8%; background: rgba(255, 255, 255, 0.9); 
            position: sticky; top: 0; z-index: 100; 
            border-bottom: 1px solid #EEE; backdrop-filter: blur(10px); 
        }
        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-img { height: 45px; width: auto; /* 浅色版不再需要滤镜，直接显示原图 */ }
        .logo-text { font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; color: var(--fd-dark); }
        .logo-text span { color: var(--dynamic-red); }

        .lang-select { background: transparent; color: var(--text-main); border: 1px solid #DDD; padding: 5px 15px; border-radius: 20px; cursor: pointer; outline: none; }
        .lang-select:hover { border-color: var(--dynamic-red); color: var(--dynamic-red); }

        /* 通用标题 */
        .section-title { text-align: center; margin-bottom: 60px; }
        .section-title h2 { font-size: 2.2rem; font-weight: 800; color: var(--fd-dark); margin-bottom: 15px; }
        .section-title .line { width: 40px; height: 4px; background: var(--dynamic-red); margin: 0 auto; border-radius: 2px; }

        /* 关于我们 */
        .section-about { padding: 100px 8%; display: flex; align-items: center; gap: 60px; flex-wrap: wrap; }
        .about-content { flex: 1; min-width: 300px; }
        .about-image { flex: 1; min-width: 300px; border-radius: 12px; overflow: hidden; box-shadow: var(--card-shadow); }
        .about-image img { width: 100%; display: block; transition: 0.5s; }

        /* Slogan：明亮渐变 */
        .slogan-hero { text-align: center; padding: 120px 5%; background: var(--fd-light-grey); }
        .slogan-text { font-size: 3rem; font-weight: 800; letter-spacing: 4px; margin-bottom: 20px; color: var(--fd-dark); }
        .slogan-text span { color: var(--dynamic-red); }

        /* 车队展示：大幅图 */
        .section-feature { padding: 80px 8%; }
        .feature-container { position: relative; border-radius: 20px; overflow: hidden; height: 500px; box-shadow: var(--card-shadow); }
        .feature-container img { width: 100%; height: 100%; object-fit: cover; }
        .feature-card { 
            position: absolute; right: 5%; bottom: 5%; background: white; 
            padding: 40px; max-width: 450px; border-radius: 12px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
        }
        .feature-card h2 { font-size: 1.8rem; margin-bottom: 15px; color: var(--fd-dark); }
        .feature-card p { color: var(--text-sub); font-weight: 500; }

        /* 服务板块：白色卡片 */
        .section-services { padding: 100px 8%; background: var(--fd-light-grey); }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 30px; }
        .service-card { background: var(--fd-white); border-radius: 12px; overflow: hidden; transition: 0.3s; box-shadow: var(--card-shadow); }
        .service-card:hover { transform: translateY(-10px); }
        .service-img { width: 100%; height: 180px; object-fit: cover; }
        .service-info { padding: 25px; }
        .service-info h3 { font-size: 1.2rem; margin-bottom: 12px; color: var(--fd-dark); }
        .service-info p { color: var(--text-sub); font-size: 0.9rem; }

        /* 评价板块 */
        .section-reviews { padding: 100px 8%; }
        .review-card { background: var(--fd-light-grey); padding: 40px; border-radius: 12px; border-top: 4px solid var(--dynamic-red); }
        .review-img-wrapper { margin-bottom: 20px; border-radius: 8px; overflow: hidden; height: 180px; }
        .review-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        /* 联系我们 */
        .section-contact { padding: 100px 8%; display: flex; gap: 60px; flex-wrap: wrap; background: var(--fd-dark); color: white; border-radius: 40px 40px 0 0; }
        .contact-info h2 { color: white; font-size: 2.2rem; }
        .contact-form { flex: 1; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; }
        .btn-submit { background: var(--dynamic-red); color: white; padding: 15px 40px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; }

        @media (max-width: 768px) {
            .slogan-text { font-size: 2rem; }
            .feature-card { position: static; max-width: 100%; border-radius: 0; }
            .section-feature { padding: 40px 0; }
        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo-container">
        <img src="logo.png" alt="FDI Logo" class="logo-img">
        <div class="logo-text">FDI<span>.INTL</span></div>
    </a>
    <select class="lang-select" onchange="updateLang(this.value)">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
        <option value="de">Deutsch</option>
    </select>
</nav>

<section class="section-about">
    <div class="about-content">
        <h2 id="about-title" style="color: var(--dynamic-red); margin-bottom: 20px;"></h2>
        <p id="about-text" style="font-size: 1.1rem; color: var(--text-sub);"></p>
    </div>
    <div class="about-image">
        <img src="about-us.jpg" alt="FDI Vision">
    </div>
</section>

<section class="slogan-hero">
    <div class="slogan-text" id="slogan-main"></div>
    <p id="slogan-sub" style="color: var(--text-sub); font-weight: 500;"></p>
</section>

<section class="section-feature">
    <div class="feature-container">
        <img src="fleet.jpg" alt="Fleet">
        <div class="feature-card">
            <h2 id="feat-title"></h2>
            <div style="width:40px; height:3px; background:var(--dynamic-red); margin-bottom:20px;"></div>
            <p id="feat-sub"></p>
        </div>
    </div>
</section>

<section class="section-services">
    <div class="section-title">
        <h2 id="serv-head">服务项目</h2>
        <div class="line"></div>
    </div>
    <div class="services-grid" id="serv-content"></div>
</section>

<section class="section-reviews">
    <div class="section-title">
        <h2 id="review-title"></h2>
        <div class="line"></div>
    </div>
    <div class="review-grid" id="review-content"></div>
</section>

<section class="section-contact">
    <div class="contact-info">
        <h2 id="contact-title"></h2>
        <div style="margin: 20px 0; color: #AAA;">Email: contact@fdi-corp.com</div>
        <p id="contact-lang-hint"></p>
    </div>
    <div class="contact-form">
        <form onsubmit="return false;">
            <input type="text" id="form-name">
            <input type="email" id="form-email">
            <textarea id="form-msg" rows="5"></textarea>
            <button type="submit" class="btn-submit" id="form-btn"></button>
        </form>
    </div>
</section>

<script>
    // i18n 字典保持不变，复用之前的逻辑
    const i18n = {
        zh: {
            aboutT: "关于 FDI",
            aboutX: "前沿动力国际 (FDI) 是一家全球领先的新能源商用车整合方案提供商。我们将中国顶尖供应链与德国尖端工程技术相结合。",
            sloganM: "驭趋势于未然，创动能以恒新",
            sloganS: "Harness the Unseen, Power the Unceasing",
            featT: "把握趋势窗口，升级车队战斗力",
            featS: "高效选型 × 灵活方案 × 快速交付",
            servH: "服务范围",
            servs: [
                {t: "商用车选型与采购顾问", p: "基于场景与 TCO 测算，提供车型配置对比、采购策略与落地建议。", img: "serv1.jpg"},
                {t: "车队升级与更新计划", p: "围绕运营效率与合规要求，制定分阶段置换方案，降低停运风险。", img: "serv2.jpg"},
                {t: "金融方案与交付支持", p: "提供按揭/融资租赁建议，协同上牌交付流程，加速投入运营。", img: "serv3.jpg"},
                {t: "配套及售后服务", p: "提供备件供应、维保计划、故障诊断，提升车辆出勤率。", img: "serv4.jpg"}
            ],
            revT: "客户见证",
            revs: [
                {p: "EVE 的 8 分钟换电技术彻底改变了运营效率。", a: "Hans Müller (德国)", img: "review1.jpg"},
                {p: "JAC 电车在日本窄路配送中表现惊人。", a: "Sato Kenji (日本)", img: "review2.jpg"}
            ],
            conT: "联系我们",
            conH: "我们的团队支持四国语言服务，为您提供无障碍全球协作。",
            fName: "您的姓名", fEmail: "您的邮箱", fMsg: "咨询内容...", fBtn: "发送信息"
        },
        en: {
            aboutT: "About FDI",
            aboutX: "Frontier Dynamics International (FDI) is a global leader in NEV commercial vehicle integration.",
            sloganM: "Harness the Unseen, Power the Unceasing",
            sloganS: "FDI's vision for global green logistics",
            featT: "Seize the Trend, Elevate Performance",
            featS: "Efficient Selection × Flexible Solutions × Rapid Delivery",
            servH: "Our Services",
            servs: [
                {t: "Procurement Consulting", p: "TCO calculations and model comparison to boost ROI.", img: "serv1.jpg"},
                {t: "Fleet Upgrade Planning", p: "Phased replacement schemes to reduce operational risks.", img: "serv2.jpg"},
                {t: "Financial & Delivery", p: "Leasing advice and coordinated registration/delivery.", img: "serv3.jpg"},
                {t: "After-sales Services", p: "Maintenance plans and spare parts to maximize uptime.", img: "serv4.jpg"}
            ],
            revT: "Testimonials",
            revs: [
                {p: "EVE's technology redefined our efficiency.", a: "Hans Müller (Germany)", img: "review1.jpg"},
                {p: "JAC trucks excel in urban challenges.", a: "Sato Kenji (Japan)", img: "review2.jpg"}
            ],
            conT: "Contact Us",
            conH: "4 languages supported for global collaboration.",
            fName: "Name", fEmail: "Email", fMsg: "Message...", fBtn: "Send"
        }
    };

    function updateLang(lang) {
        const d = i18n[lang] || i18n['en'];
        document.getElementById('about-title').innerText = d.aboutT;
        document.getElementById('about-text').innerText = d.aboutX;
        document.getElementById('slogan-main').innerHTML = d.sloganM;
        document.getElementById('slogan-sub').innerText = d.sloganS;
        document.getElementById('feat-title').innerText = d.featT;
        document.getElementById('feat-sub').innerText = d.featS;
        document.getElementById('serv-head').innerText = d.servH;
        document.getElementById('review-title').innerText = d.revT;
        document.getElementById('contact-title').innerText = d.conT;
        document.getElementById('contact-lang-hint').innerText = d.conH;
        document.getElementById('form-name').placeholder = d.fName;
        document.getElementById('form-email').placeholder = d.fEmail;
        document.getElementById('form-msg').placeholder = d.fMsg;
        document.getElementById('form-btn').innerText = d.fBtn;

        const servGrid = document.getElementById('serv-content');
        servGrid.innerHTML = d.servs.map(s => `
            <div class="service-card">
                <img src="${s.img}" class="service-img">
                <div class="service-info">
                    <h3>${s.t}</h3>
                    <p>${s.p}</p>
                </div>
            </div>
        `).join('');

        const revGrid = document.getElementById('review-content');
        revGrid.innerHTML = d.revs.map(r => `
            <div class="review-card">
                <div class="review-img-wrapper"><img src="${r.img}"></div>
                <div style="color:#FFD700; margin-bottom:10px;">★★★★★</div>
                <p style="font-style:italic;">"${r.p}"</p>
                <div style="margin-top:15px; font-weight:bold; color:var(--fd-dark);">${r.a}</div>
            </div>
        `).join('');
    }

    updateLang('zh');
</script>

</body>
</html>
