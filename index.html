<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDI - Frontier Dynamics International</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --fd-black: #0A0A0A;
            --dynamic-red: #E63946;
            --eco-green: #2D6A4F;
            --card-bg: #161616;
            --text-light: #FFFFFF;
            --text-dim: #A0A0A0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--fd-black); color: var(--text-light); line-height: 1.6; overflow-x: hidden; }

        .dots-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(230, 57, 70, 0.08) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 8%; background: rgba(10, 10, 10, 0.9); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 3px; }
        .logo span { color: var(--dynamic-red); }

        .lang-select { background: transparent; color: white; border: 1px solid var(--dynamic-red); padding: 5px 15px; border-radius: 20px; cursor: pointer; outline: none; }

        /* 通用标题样式 */
        .section-title { text-align: center; margin-bottom: 50px; }
        .section-title h2 { font-size: 2.5rem; margin-bottom: 10px; }
        .section-title .line { width: 50px; height: 3px; background: var(--dynamic-red); margin: 0 auto; }

        .section-about { padding: 80px 8%; display: flex; align-items: center; gap: 50px; flex-wrap: wrap; }
        .about-content { flex: 1; min-width: 300px; }
        .about-image { flex: 1; min-width: 300px; border-radius: 20px; overflow: hidden; border: 1px solid var(--dynamic-red); }
        .about-image img { width: 100%; display: block; filter: grayscale(0.8); transition: 0.5s; }

        .slogan-hero { text-align: center; padding: 120px 5%; background: linear-gradient(to bottom, #0A0A0A, #161616); }
        .slogan-text { font-size: 3rem; font-weight: 800; letter-spacing: 8px; margin-bottom: 20px; color: var(--dynamic-red); transition: 0.5s; }

        .section-feature { width: 100%; padding: 60px 0; background: var(--fd-black); }
        .feature-bg { position: relative; width: 100%; height: 550px; overflow: hidden; }
        .feature-bg img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        .feature-card { position: absolute; right: 10%; top: 50%; transform: translateY(-50%); background: rgba(255, 255, 255, 0.95); padding: 50px; max-width: 520px; box-shadow: 25px 25px 80px rgba(0,0,0,0.5); border-radius: 4px; }
        .feature-card h2 { color: #0A0A0A; font-size: 2.4rem; font-weight: 800; line-height: 1.3; margin-bottom: 20px; }
        .feature-line { width: 60px; height: 5px; background: var(--dynamic-red); margin-bottom: 25px; }
        .feature-card p { color: #333; font-size: 1.25rem; font-weight: 600; letter-spacing: 1px; }

        /* 新增：服务板块样式 */
        .section-services { padding: 80px 8%; background: var(--fd-black); }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .service-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; transition: 0.3s; border: 1px solid #222; }
        .service-card:hover { transform: translateY(-10px); border-color: var(--dynamic-red); }
        .service-img { width: 100%; height: 200px; object-fit: cover; filter: grayscale(0.3); }
        .service-info { padding: 30px; }
        .service-info h3 { color: var(--text-light); margin-bottom: 15px; font-size: 1.4rem; }
        .service-info p { color: var(--text-dim); font-size: 0.95rem; line-height: 1.6; }

        .section-reviews { padding: 80px 8%; background: #0F0F0F; }
        .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .review-card { background: var(--card-bg); padding: 40px; border-radius: 20px; border-left: 4px solid var(--eco-green); }
        .review-img-wrapper { margin-bottom: 20px; border-radius: 10px; overflow: hidden; height: 200px; background: #222; }
        .review-img-wrapper img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(0.5) contrast(1.2); }

        .section-contact { padding: 80px 8%; display: flex; gap: 50px; flex-wrap: wrap; }
        .contact-info { flex: 1; }
        .contact-form { flex: 1; background: #1A1A1A; padding: 40px; border-radius: 20px; }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 20px; background: #0A0A0A; border: 1px solid #333; color: white; border-radius: 8px; }
        .btn-submit { background: var(--dynamic-red); color: white; padding: 15px 40px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }

        @media (max-width: 768px) { 
            .slogan-text { font-size: 1.8rem; letter-spacing: 4px; } 
            .feature-card { right: 5%; left: 5%; padding: 35px; width: auto; }
            .feature-card h2 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="dots-bg"></div>

<nav>
    <div class="logo">FDI<span>.INTL</span></div>
    <select class="lang-select" onchange="updateLang(this.value)">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
        <option value="de">Deutsch</option>
    </select>
</nav>

<section class="section-about">
    <div class="about-content">
        <h2 id="about-title" style="color: var(--dynamic-red); margin-bottom: 20px;"></h2>
        <p id="about-text" style="font-size: 1.1rem; color: var(--text-dim);"></p>
    </div>
    <div class="about-image">
        <img src="about-us.jpg" alt="FDI Vision">
    </div>
</section>

<section class="slogan-hero">
    <div class="slogan-text" id="slogan-main"></div>
    <p id="slogan-sub" style="color: var(--text-dim);"></p>
</section>

<section class="section-feature">
    <div class="feature-bg">
        <img src="fleet.jpg" alt="Fleet Management">
        <div class="feature-card">
            <h2 id="feat-title"></h2>
            <div class="feature-line"></div>
            <p id="feat-sub"></p>
        </div>
    </div>
</section>

<!-- 新增：服务板块 (Services) -->
<section class="section-services">
    <div class="section-title">
        <h2 id="serv-head">服务</h2>
        <div class="line"></div>
    </div>
    <div class="services-grid" id="serv-content"></div>
</section>

<section class="section-reviews">
    <div class="section-title">
        <h2 id="review-title"></h2>
        <div class="line"></div>
    </div>
    <div class="review-grid" id="review-content"></div>
</section>

<section class="section-contact">
    <div class="contact-info">
        <h2 id="contact-title"></h2>
        <div style="margin: 20px 0; color: var(--text-dim);">Email: contact@fdi-corp.com</div>
        <p id="contact-lang-hint"></p>
    </div>
    <div class="contact-form">
        <form onsubmit="return false;">
            <input type="text" id="form-name">
            <input type="email" id="form-email">
            <textarea id="form-msg" rows="5"></textarea>
            <button type="submit" class="btn-submit" id="form-btn"></button>
        </form>
    </div>
</section>

<script>
    const i18n = {
        zh: {
            aboutT: "关于 FDI",
            aboutX: "前沿动力国际 (FDI) 是一家全球领先的新能源商用车整合方案提供商。我们将中国顶尖供应链与德国尖端工程技术相结合。",
            sloganM: "驭趋势于未然<br>创动能以恒新",
            sloganS: "Harness the Unseen, Power the Unceasing",
            featT: "把握趋势窗口，升级车队战斗力",
            featS: "高效选型 × 灵活方案 × 快速交付",
            servH: "服务范围",
            servs: [
                {t: "商用车选型与采购顾问", p: "基于场景与 TCO 测算，提供车型配置对比、采购策略与落地建议，提升投入产出比。", img: "serv1.jpg"},
                {t: "车队升级与更新计划", p: "围绕运营效率与合规要求，制定分阶段置换方案，降低停运风险与维护成本。", img: "serv2.jpg"},
                {t: "金融方案与交付支持", p: "提供按揭/融资租赁等选择建议，协同上牌、交付与验车流程，加速车辆投入运营。", img: "serv3.jpg"},
                {t: "配套及售后服务", p: "提供备件供应、维保计划、故障诊断与现场支持，提升维保效率与车辆出勤率。", img: "serv4.jpg"}
            ],
            revT: "全球客户见证",
            revs: [
                {p: "EVE 的 8 分钟换电技术彻底改变了运营效率。", a: "Hans Müller (德国)", img: "review1.jpg"},
                {p: "FDI 提供的 JAC 电车在日本窄路配送中表现惊人。", a: "Sato Kenji (日本)", img: "review2.jpg"}
            ],
            conT: "联系我们",
            conH: "我们的团队支持四国语言服务，为您提供无障碍全球协作。",
            fName: "您的姓名", fEmail: "您的邮箱", fMsg: "咨询内容...", fBtn: "发送信息"
        },
        en: {
            aboutT: "About FDI",
            aboutX: "Frontier Dynamics International (FDI) is a global leader in NEV commercial vehicle integration, combining China's supply chain with German engineering.",
            sloganM: "Harness the Unseen<br>Power the Unceasing",
            sloganS: "FDI's 12-character vision for global logistics",
            featT: "Seize the Trend, Elevate Fleet Performance",
            featS: "Efficient Selection × Flexible Solutions × Rapid Delivery",
            servH: "Our Services",
            servs: [
                {t: "Procurement Consulting", p: "Model configuration comparison and procurement strategies based on TCO calculations to boost ROI.", img: "serv1.jpg"},
                {t: "Fleet Upgrade Planning", p: "Phased replacement schemes centered on efficiency and compliance to reduce operational risks.", img: "serv2.jpg"},
                {t: "Financial & Delivery Support", p: "Mortgage/leasing advice and coordinated registration/delivery to speed up vehicle deployment.", img: "serv3.jpg"},
                {t: "After-sales Services", p: "Spare parts, maintenance plans, and field support to maximize vehicle uptime and fleet efficiency.", img: "serv4.jpg"}
            ],
            revT: "Global Testimonials",
            revs: [
                {p: "EVE's 8-minute swap technology redefined our efficiency.", a: "Hans Müller (Germany)", img: "review1.jpg"},
                {p: "JAC electric trucks excel in Japan's urban challenges.", a: "Sato Kenji (Japan)", img: "review2.jpg"}
            ],
            conT: "Contact Us",
            conH: "Our team supports 4 languages for seamless global collaboration.",
            fName: "Your Name", fEmail: "Your Email", fMsg: "Message...", fBtn: "Send Message"
        },
        jp: {
            aboutT: "FDIについて",
            aboutX: "中国のサプライチェーンとドイツの技術を融合させた、次世代商用電気自動車のグローバルリーダーです。",
            sloganM: "トレンドを未然に御し<br>絶え間なき動力を創る",
            sloganS: "Harness the Unseen, Power the Unceasing",
            featT: "トレンドを掴み、フリートの戦力を強化する",
            featS: "効率的な選定 × 柔軟なソリューション × 迅速な納品",
            servH: "サービス",
            servs: [
                {t: "車両選定・調達コンサル", p: "TCO算出に基づき、最適な車種構成や調達戦略を提案し、投資対効果を最大化します。", img: "serv1.jpg"},
                {t: "フリート更新計画", p: "運営効率とコンプライアンスを重視し、段階的な入れ替え案を策定、維持コストを削減します。", img: "serv2.jpg"},
                {t: "金融・納車サポート", p: "リース等の提案、登録・納車フローの調整を行い、車両の稼働開始を加速させます。", img: "serv3.jpg"},
                {t: "アフターサービス", p: "スペアパーツ供給、保守計画、現場サポートにより、車両の稼働率を向上させます。", img: "serv4.jpg"}
            ],
            revT: "お客様の声",
            revs: [
                {p: "EVEの8分間バッテリー交換技術は、物流の効率を劇的に向上させました。", a: "Hans Müller (ドイツ)", img: "review1.jpg"},
                {p: "JACのEVトラックは日本の狭い道路でも優れた性能を発揮します。", a: "佐藤 健二 (日本)", img: "review2.jpg"}
            ],
            conT: "お問い合わせ",
            conH: "当社のチームは4ヶ国語に対応しており、グローバルなビジネスを強力にサポートします。",
            fName: "お名前", fEmail: "メールアドレス", fMsg: "お問い合わせ内容...", fBtn: "送信する"
        },
        de: {
            aboutT: "Über FDI",
            aboutX: "Führender Anbieter für NEV-Nutzfahrzeuge, der deutsche Ingenieurskunst mit chinesischer Produktion vereint.",
            sloganM: "Trends voraussehen<br>Dynamik stetig erneuern",
            sloganS: "Harness the Unseen, Power the Unceasing",
            featT: "Trends nutzen, Flottenleistung steigern",
            featS: "Effiziente Auswahl × Flexible Lösungen × Schnelle Lieferung",
            servH: "Dienstleistungen",
            servs: [
                {t: "Beschaffungsberatung", p: "TCO-basierte Modellkonfiguration und Strategien zur Maximierung Ihres ROI.", img: "serv1.jpg"},
                {t: "Flottenmodernisierung", p: "Stufenweise Austauschpläne zur Senkung von Ausfallrisiken und Wartungskosten.", img: "serv2.jpg"},
                {t: "Finanzierung & Auslieferung", p: "Leasingberatung und Koordination der Zulassung für eine schnelle Inbetriebnahme.", img: "serv3.jpg"},
                {t: "After-Sales-Support", p: "Ersatzteilversorgung und Wartungspläne zur Maximierung der Fahrzeugverfügbarkeit.", img: "serv4.jpg"}
            ],
            revT: "Kundenstimmen",
            revs: [
                {p: "Die 8-Minuten-Wechseltechnologie von EVE hat unsere Effizienz neu definiert.", a: "Hans Müller (Deutschland)", img: "review2.jpg"}
            ],
            conT: "Kontakt",
            conH: "Unser Team unterstützt 4 Sprachen für eine reibungslose globale Zusammenarbeit.",
            fName: "Name", fEmail: "E-Mail", fMsg: "Nachricht...", fBtn: "Senden"
        }
    };

    function updateLang(lang) {
        const d = i18n[lang] || i18n['en'];
        document.getElementById('about-title').innerText = d.aboutT;
        document.getElementById('about-text').innerText = d.aboutX;
        document.getElementById('slogan-main').innerHTML = d.sloganM;
        document.getElementById('slogan-sub').innerText = d.sloganS;
        document.getElementById('feat-title').innerText = d.featT;
        document.getElementById('feat-sub').innerText = d.featS;
        document.getElementById('serv-head').innerText = d.servH;
        document.getElementById('review-title').innerText = d.revT;
        document.getElementById('contact-title').innerText = d.conT;
        document.getElementById('contact-lang-hint').innerText = d.conH;
        document.getElementById('form-name').placeholder = d.fName;
        document.getElementById('form-email').placeholder = d.fEmail;
        document.getElementById('form-msg').placeholder = d.fMsg;
        document.getElementById('form-btn').innerText = d.fBtn;

        // 更新服务板块内容
        const servGrid = document.getElementById('serv-content');
        servGrid.innerHTML = d.servs.map(s => `
            <div class="service-card">
                <img src="${s.img}" class="service-img" alt="${s.t}">
                <div class="service-info">
                    <h3>${s.t}</h3>
                    <p>${s.p}</p>
                </div>
            </div>
        `).join('');

        // 更新评价板块内容
        const revGrid = document.getElementById('review-content');
        revGrid.innerHTML = d.revs.map(r => `
            <div class="review-card">
                <div class="review-img-wrapper">
                    <img src="${r.img}" alt="Customer Testimony">
                </div>
                <div style="color:#FFD700; margin-bottom:15px;">★★★★★</div>
                <p>"${r.p}"</p>
                <div style="margin-top:20px; font-weight:bold;">${r.a}</div>
            </div>
        `).join('');
    }

    const initialLang = i18n[navigator.language.split('-')[0]] ? navigator.language.split('-')[0] : 'zh';
    document.querySelector('.lang-select').value = initialLang;
    updateLang(initialLang);
</script>

</body>
</html>
